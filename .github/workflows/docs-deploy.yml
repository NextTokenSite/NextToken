# 把 docs-site/(VitePress)构建并部署到 GitHub Pages
# 自定义域名:docs.nexttoken.online(由 docs-site/public/CNAME 控制)
#
# 触发条件:仅在 docs-site/** 或本 workflow 自身改动时跑,避免主仓库其它 push 误触
name: Deploy Docs Site

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

# 部署到 Pages 所需的最小权限集
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署,排队但不取消正在进行的(避免回滚到旧版本)
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # vitepress lastUpdated 需要完整 git 历史

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # 首次跑时仓库还没创建过 Pages site,enablement 让 action 在缺失时自动创建,
          # 已存在则无操作,后续跑保持幂等。
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (with DOCS_BASE='/' for custom domain)
        run: pnpm run build
        env:
          DOCS_BASE: '/'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
